_base_: base.yaml

# TouchAnything training config
# Inputs: three camera views + hand joint positions
# Outputs: ground-truth tactile pressure maps (one 21x21 map per hand)

model:
  task: "tactile_prediction"
  num_input_joints: 42  # 21 joints/hand x 2 (ROKOKO format)

  vision_encoder:
    type: "dinov2"
    model_name: "dinov2_vitb14"
    pretrained_path: "models/dinov2/dinov2_vitb14_pretrain.pth"
    freeze: true
    patch_size: 14
    embed_dim: 768

  temporal_transformer:
    num_layers: 3
    num_heads: 8
    hidden_dim: 768
    mlp_ratio: 4.0
    dropout: 0.1
    window_size: 16

  # Use the three real camera streams (chest=ego, left=wrist_left, right=wrist_right)
  multi_view:
    enabled: true
    num_cross_layers: 2
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.1
    view_dropout_prob: 0.3   # Randomly drop wrist cameras during training to improve robustness

  # Pose encoder: encode 42x3 joint positions into per-joint features (B,T,J,D) for CrossAttentionFusion
  pose_encoder:
    type: "transformer"
    num_joints: 42
    num_layers: 2
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.1
    output_mode: "per_joint"

  # Vision-pose fusion
  fusion:
    type: "cross_attention"
    num_heads: 8
    num_layers: 2
    mlp_ratio: 4.0
    dropout: 0.1

  # Tactile decoder (accepts per-joint inputs with shape (B,T,J,D))
  tactile_decoder:
    type: "joint_level"
    num_joints: 42
    conv_channels: 128
    tactile_size: 21   # Output a 21x21 pressure map aligned with the native sensor resolution
    dropout: 0.1

data:
  dataset: "touchanything"

  # HDF5 dataset path (generated by scripts/core/convert_to_hdf5.py)
  data_root: "datasets/TouchAnything_hdf5_opensource_en"

  # Pose source control:
  # - pose_source=wilor: use WiLoR pose (recommended for training)
  # - fallback_pose_source=null: no fallback (only use WiLoR)
  pose_source: "wilor"
  fallback_pose_source: null

  # Predefined split file (generated from quality filtering + task-balanced splitting)
  split_file: "datasets/TouchAnything_hdf5_opensource_en/split.json"

  # Pressure sensor position mapping JSON
  mapping_left: "configs/pressure_position_mapping_left.json"
  mapping_right: "configs/pressure_position_mapping_right.json"

  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

  image_size: [224, 224]
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

  clip_length: 8
  frame_interval: 2  # sample every 2 frames to preserve more temporal information

  # Tactile pressure processing
  # Note: baseline correction and right-hand broken-column interpolation are already preprocessed in convert_to_hdf5.py
  tactile_size: 21          # Output pressure-map resolution aligned with the native 21x21 sensor grid

  use_augmentation: false
  random_crop: false
  random_flip: false
  color_jitter: 0.2
  
  # Glove augmentation settings (OPTIMIZED with vectorization)
  glove_augmentation:
    enabled: true
    prob: 0.2  # Probability of applying augmentation to a clip (50%)
    
    # Augmentation types to use (if not specified, uses default balanced set)
    # Default includes:
    #   - 7 solid skin colors (solid-color replacement) - VECTORIZED (10-20x faster)
    #   - 3 skin tones with texture (preserve texture) - per-frame processing
    #   - 4 fabric colors - VECTORIZED (10-20x faster)
    #   - 4 patterns (stripes, checkerboard, dots) - per-frame processing
    #   - 2 natural variations (brightness, noise) - VECTORIZED (10-20x faster)
    # Total: 20 augmentation types
    # Performance: ~13/20 methods use vectorized operations (65% fast path)
    
    # You can customize the augmentation types:
    # types:
    #   - skin_color_light
    #   - skin_color_medium
    #   - skin_color_dark
    #   - fabric_black
    #   - fabric_white
    #   - horizontal_stripes
    #   - vertical_stripes
    #   - brightness_variation

training:
  batch_size: 16          # Per GPU batch size for DDP (6 GPUs x 16 = 96 total)
  num_workers: 4          # Per-GPU workers for DDP (reduced to lower prefetch memory)
  num_epochs: 100
  gradient_accumulation_steps: 3  # Effective batch = 96 x 3 = 288

  # Invalid-pose policy: keep / skip_frame / skip_clip
  invalid_pose_policy: "keep"
  pose_valid_joint_ratio_threshold: 0.0

  optimizer:
    type: "adamw"
    lr: 5.0e-5              # Lowered to 5e-5 to reduce gradient explosion and NaNs
    weight_decay: 0.05
    betas: [0.9, 0.999]

  scheduler:
    type: "cosine"
    warmup_epochs: 10       # Use a longer warmup for smoother LR ramp-up
    min_lr: 1.0e-6

  loss:
    mse_weight: 1.0
    l1_weight: 0.5
    tv_weight: 0.01
    contact_weight: 3.0      # apply 3x weight to high-pressure regions to prevent all-zero predictions
    pressure_threshold: 0.1  # pressure > 0.1 is treated as contact

  save_interval: 5
  log_interval: 10
  val_interval: 1

system:
  seed: 42
  gpu_ids: [2,3,4,5,6,7]
  mixed_precision: false
  cudnn_benchmark: true
